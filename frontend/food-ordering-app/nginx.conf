server {
    listen 80;
    server_name localhost;

    # 1. Serve frontend static assets
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Fallback to index.html for Angular routing (SPA)
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy all API requests (foods, orders, auth)
    # Assumes backend routes are unified under /api/...
    location /api/ {
        proxy_pass http://backend:3000; # Forward full path, e.g., /api/foods -> backend:3000/api/foods
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # 3. Serve uploaded files (images)
    # If backend handles static files directly, this configuration works
    location /uploads/ {
        proxy_pass http://backend:3000/uploads/;
    }

    # Error page handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}