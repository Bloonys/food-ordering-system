<div class="position-fixed top-0 end-0 p-3" style="z-index: 9999;">
  @if (notification()) {
    <div class="toast show align-items-center text-white bg-primary border-0 shadow-lg animate__animated animate__fadeInDown" role="alert">
      <div class="d-flex">
        <div class="toast-body d-flex align-items-center">
          <i class="bi bi-bell-fill me-2 animate__animated animate__swing animate__infinite"></i>
          <div>
            <strong>New Order!</strong><br>
            <small>{{ notification()?.message }}</small>
          </div>
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="notification.set(null)"></button>
      </div>
      <div class="progress" style="height: 2px; background-color: rgba(255,255,255,0.2);">
        <div class="progress-bar bg-white" role="progressbar" style="width: 100%"></div>
      </div>
    </div>
  }
</div>

<app-header></app-header>

<div class="app-wrapper">
  <app-nav></app-nav>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
