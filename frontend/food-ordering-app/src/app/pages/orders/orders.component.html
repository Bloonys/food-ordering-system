<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-white">Order Management</h2>
    <span class="badge bg-info">{{ orders.length }} Total Orders</span>
  </div>

  <div *ngIf="loading" class="text-center text-white">
    <div class="spinner-border" role="status"></div>
    <p>Loading orders...</p>
  </div>

  <div class="table-responsive" *ngIf="!loading">
    <table class="table table-dark table-hover align-middle">
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Time</th>
          <th>Total Amount</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let order of orders" class="animate-in">
          <td>#{{ order.id }}</td>
          <td>{{ order.createdAt | date:'short' }}</td>
          <td class="text-success fw-bold">${{ order.total_amount }}</td>
          <td>
            <span [ngClass]="getStatusClass(order.status)">
              {{ order.status | uppercase }}
            </span>
          </td>
          <td>
            <button class="btn btn-sm btn-outline-primary">View Details</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="!loading && orders.length === 0" class="alert alert-dark text-center">
    No orders found.
  </div>
</div>
